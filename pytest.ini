[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: async test (requires pytest-asyncio)
    slow: GuardianCore or network-heavy; exclude with -m "not slow"
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

