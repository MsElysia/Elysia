<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - Project Guardian</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #6366f1; margin-bottom: 30px; }
        .card {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .log-content {
            background: #0f172a;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.5;
            color: #cbd5e1;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 1em;
            margin-right: 10px;
            margin-top: 10px;
        }
        .btn:hover { background: #4f46e5; }
        .btn-secondary { background: #8b5cf6; }
        .btn-secondary:hover { background: #7c3aed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
        
        <div class="card" style="margin-top: 20px;">
            <div class="log-content">{{ log_content }}</div>
        </div>
    </div>
</body>
</html>
