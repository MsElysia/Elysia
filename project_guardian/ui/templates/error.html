<!DOCTYPE html>
<html>
<head>
    <title>Error - Project Guardian</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #ef4444; margin-bottom: 20px; }
        .card {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
        }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{% if error_title %}{{ error_title }}{% else %}Error{% endif %}</h1>
        <div class="card">
            <p>{% if error_message %}{{ error_message }}{% elif message %}{{ message }}{% else %}An error occurred.{% endif %}</p>
            {% if status_code %}
            <p style="color: #cbd5e1; font-size: 0.9em; margin-top: 10px;">Status Code: {{ status_code }}</p>
            {% endif %}
            <a href="/" class="btn">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
